<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מרכז שליטה — דניאל</title>
<style>
  :root{
    --bg:#0c0e14; --panel:#151823; --panel2:#1c2030; --line:#262b3d;
    --txt:#e7eaf3; --muted:#8a91a6; --accent:#c6a15b; --accent2:#6ea8fe;
    --ok:#4ade80; --warn:#fbbf24; --hot:#fb7185;
    --r:14px; --shadow:0 6px 24px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(1200px 600px at 80% -10%,#171a27 0,var(--bg) 60%);
    color:var(--txt);font-family:"Segoe UI",Heebo,Arial,sans-serif;line-height:1.5;padding:22px 16px 60px}
  .wrap{max-width:1360px;margin:0 auto}
  header.top{display:flex;flex-wrap:wrap;align-items:baseline;gap:12px;justify-content:space-between;
    padding-bottom:14px;border-bottom:1px solid var(--line);margin-bottom:6px}
  h1{font-size:26px;margin:0;letter-spacing:.5px}
  h1 .dot{color:var(--accent)}
  .updated{color:var(--muted);font-size:13px}
  .sec-title{font-size:14px;color:var(--accent);letter-spacing:1px;text-transform:uppercase;
    margin:26px 2px 12px;font-weight:700}
  .stat{color:var(--muted);font-size:12px;font-weight:400;text-transform:none;letter-spacing:0}

  /* layout: main + side menu (RTL → main on right, side on left) */
  .layout{display:flex;gap:26px;align-items:flex-start;margin-top:6px}
  .main{flex:1;min-width:0}
  aside.side{width:300px;flex-shrink:0;position:sticky;top:16px;
    max-height:calc(100vh - 32px);overflow-y:auto;
    background:linear-gradient(180deg,var(--panel),#10131c);border:1px solid var(--line);
    border-radius:var(--r);padding:6px 16px 18px;box-shadow:var(--shadow)}
  aside.side .sec-title{margin:20px 0 10px}
  aside.side .sec-title:first-child{margin-top:8px}
  @media(max-width:980px){
    .layout{flex-direction:column}
    aside.side{width:100%;position:static;max-height:none}
  }

  /* gantt (reserved for marketing plan — next 6 months) */
  .gantt{background:linear-gradient(180deg,var(--panel),#10131c);border:1px solid var(--line);
    border-radius:var(--r);padding:14px 16px;box-shadow:var(--shadow);overflow-x:auto}
  .gantt .months{display:grid;gap:0;border-bottom:1px solid var(--line);margin-bottom:10px}
  .gantt .months .mh{font-size:12px;color:var(--muted);text-align:center;padding:0 4px 8px;
    border-inline-start:1px solid var(--line);font-weight:600}
  .gantt .months .mh:first-child{border-inline-start:none}
  .gantt .grow{display:grid;align-items:center;gap:0;position:relative;min-height:30px}
  .gantt .glabel{grid-column:1;font-size:12.5px;padding:5px 8px 5px 0;white-space:nowrap;position:sticky;inset-inline-start:0}
  .gantt .track{position:relative;height:22px;border-inline-start:1px solid var(--line)}
  .gantt .barx{position:absolute;top:3px;height:16px;border-radius:6px;font-size:10.5px;
    color:#0c0e14;font-weight:700;display:flex;align-items:center;padding:0 7px;white-space:nowrap;overflow:hidden}
  .gantt .empty{color:var(--muted);font-size:13px;text-align:center;padding:26px 10px 22px;
    border:1px dashed var(--line);border-radius:10px;margin-top:4px}
  .gantt .empty b{color:var(--accent);font-weight:700}

  /* projects masonry */
  .projects{columns:2;column-gap:16px}
  @media(max-width:880px){.projects{columns:1}}
  .card{background:linear-gradient(180deg,var(--panel),#11141d);border:1px solid var(--line);
    border-radius:var(--r);padding:15px 16px 13px;box-shadow:var(--shadow);
    margin:0 0 16px;break-inside:avoid;display:inline-block;width:100%}
  .card .hd{display:flex;align-items:center;gap:9px;margin-bottom:3px}
  .card .em{font-size:20px;line-height:1}
  .card .nm{font-size:16px;font-weight:700;flex:1}
  .card .pct{font-size:12px;font-weight:700;color:var(--muted);font-variant-numeric:tabular-nums}
  .card .desc{color:var(--muted);font-size:12.5px;margin:0 0 10px}
  .bar{height:6px;border-radius:999px;background:#0c0f18;border:1px solid var(--line);overflow:hidden;margin-bottom:11px}
  .bar > i{display:block;height:100%;border-radius:999px}
  ul.tasks{list-style:none;margin:0;padding:0}
  ul.tasks li{display:flex;gap:8px;align-items:flex-start;padding:3.5px 0;font-size:13px}
  .mark{flex-shrink:0;width:16px;height:16px;border-radius:5px;display:inline-flex;align-items:center;
    justify-content:center;font-size:11px;margin-top:1px;border:1px solid var(--line)}
  .mark.done{background:rgba(74,222,128,.13);color:var(--ok);border-color:#23402f}
  .mark.open{background:transparent;color:var(--muted)}
  li.done .tx{color:var(--muted);text-decoration:line-through;text-decoration-color:#3a4055}
  li.crit .tx{color:var(--hot)}
  .tx{flex:1}

  /* agents (in side menu — vertical stack) */
  .agents{display:flex;flex-direction:column;gap:10px}
  .agent{background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:10px 12px}
  .agent .top2{display:flex;align-items:center;gap:8px;margin-bottom:4px}
  .agent .nm{font-weight:600;font-size:14px;flex:1}
  .agent .what{color:var(--muted);font-size:12px;margin-bottom:6px}
  .agent .meta{font-size:11.5px;color:var(--accent2)}
  .pill{font-size:11px;padding:2px 8px;border-radius:999px;border:1px solid var(--line);color:var(--muted);white-space:nowrap}
  .pill.ok{color:var(--ok);border-color:#1f3a2a}
  .pill.warn{color:var(--warn);border-color:#3a341f}
  .pill.dev{color:var(--accent2);border-color:#1f2f4a}

  /* links (in side menu — stacked) */
  .links{display:flex;flex-direction:column;gap:16px}
  .lcol h4{font-size:13px;margin:0 0 8px;color:var(--txt)}
  .lcol ul{list-style:none;margin:0;padding:0}
  .lcol li{padding:4px 0;font-size:13px}
  .lcol a{color:var(--txt);text-decoration:none;border-bottom:1px solid var(--accent)}
  .lcol a:hover{color:var(--accent)}
  .local{color:var(--warn);font-size:12px}
  footer{color:var(--muted);font-size:12px;text-align:center;margin-top:34px;border-top:1px solid var(--line);padding-top:16px}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <h1><span class="dot">◆</span> מרכז שליטה <span style="color:var(--muted);font-weight:400;font-size:16px">— דניאל</span></h1>
    <div class="updated" id="updated"></div>
  </header>

  <div class="layout">
    <main class="main">
      <div class="sec-title">📅 גאנט שיווק — חצי שנה קרובה <span class="stat" id="ganttStat"></span></div>
      <div class="gantt" id="gantt"></div>

      <div class="sec-title">הפרויקטים <span class="stat" id="projStat"></span></div>
      <div class="projects" id="projects"></div>
    </main>

    <aside class="side">
      <div class="sec-title">🤖 סוכנים</div>
      <div class="agents" id="agents"></div>

      <div class="sec-title">🔗 קבצים ואתרים</div>
      <div class="links" id="links"></div>
    </aside>
  </div>

  <footer>הקוקפיט מתוחזק על ידי Claude — דניאל לא מעדכן ידנית. ✓ = בוצע · ○ = פתוח. רענון: יומי / שבועי / חודשי.</footer>
</div>

/* ===================== RENDER ===================== */
const $=id=>document.getElementById(id);
$("updated").textContent="עודכן: "+DATA.updated;

function barColor(p){
  if(p>=75) return "linear-gradient(90deg,#3fae6b,#4ade80)";
  if(p>=40) return "linear-gradient(90deg,#b9892f,#fbbf24)";
  return "linear-gradient(90deg,#b5475a,#fb7185)";
}

/* ---- Gantt (reserved 6-month marketing timeline) ---- */
(function(){
  const g=DATA.gantt, n=g.months.length;
  const colTmpl=`grid-template-columns:150px repeat(${n},1fr)`;
  const monthsRow=`<div class="months" style="${colTmpl}"><div></div>`+
    g.months.map(m=>`<div class="mh">${m}</div>`).join("")+`</div>`;
  let rowsHtml="";
  if(!g.rows.length){
    rowsHtml=`<div class="empty">המרחב שמור ל<b>גאנט השיווק</b> — יתמלא כשתיסגר תוכנית השיווק לחצי השנה הקרובה.<br>הקמפיין הראשון (Google Search · Black Diamond) בטיוטה לאישור.</div>`;
  } else {
    rowsHtml=g.rows.map(r=>{
      const left=(r.start/n*100), width=(r.span/n*100);
      const bg=r.color||"var(--accent)";
      return `<div class="grow" style="${colTmpl}">
        <div class="glabel">${r.label}</div>
        <div class="track" style="grid-column:2 / ${n+2}">
          <div class="barx" style="inset-inline-start:${left}%;width:calc(${width}% - 4px);background:${bg}">${r.label}</div>
        </div></div>`;
    }).join("");
  }
  $("gantt").innerHTML=monthsRow+rowsHtml;
  $("ganttStat").textContent = g.rows.length ? `· ${g.rows.length} קמפיינים` : "· מרחב שמור";
})();

let totDone=0, totTasks=0;
$("projects").innerHTML = DATA.projects.map(p=>{
  const done=p.tasks.filter(t=>t.done).length, tot=p.tasks.length;
  const pct=Math.round(done/tot*100); totDone+=done; totTasks+=tot;
  const rows=p.tasks.map(t=>{
    const cls=(t.done?"done":"")+(t.crit?" crit":"");
    const mk=t.done?`<span class="mark done">✓</span>`:`<span class="mark open">○</span>`;
    return `<li class="${cls}">${mk}<span class="tx">${t.t}</span></li>`;
  }).join("");
  return `<div class="card">
    <div class="hd"><span class="em">${p.em}</span><span class="nm">${p.nm}</span><span class="pct">${done}/${tot} · ${pct}%</span></div>
    <div class="desc">${p.desc}</div>
    <div class="bar"><i style="width:${pct}%;background:${barColor(pct)}"></i></div>
    <ul class="tasks">${rows}</ul>
  </div>`;
}).join("");
$("projStat").textContent=`· ${DATA.projects.length} פרויקטים · ${totDone}/${totTasks} משימות הושלמו`;

    <div class="meta">${a.meta}</div>
